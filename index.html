<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa con Ruta en Saltillo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #panelSuperior {
            width: 100%;
            height: 120px;
            background: #2b2b2b;
            color: white;
            padding: 20px;
        }

        #contenedorMapa {
            width: 100%;
            height: calc(100vh - 120px);
        }
    </style>
</head>
<body>
    <div id="panelSuperior">
        <h2>Ruta en Saltillo</h2>
        <p>Desde tu ubicación hasta el Museo de las Aves de México</p>
    </div>

    <div id="contenedorMapa">
        <!-- Ruta: Tu ubicación (o centro de Saltillo) hasta Museo de las Aves -->
        <iframe
            src="https://www.google.com/maps/embed/v1/directions?key=AIzaSyAjwIYlkQQCbqguGflc3tQifzE2onneqco&origin=Saltillo,Coahuila,Mexico&destination=Museo%20de%20las%20Aves%20de%20M%C3%A9xico%2C%20Saltillo%2C%20Coahuila&mode=driving"
            width="100%"
            height="100%"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>

    <script>
        // Función para intentar obtener tu ubicación y actualizar la ruta
        window.onload = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(posicion) {
                        // Si detecta tu ubicación, actualiza la ruta
                        const miLat = posicion.coords.latitude;
                        const miLng = posicion.coords.longitude;
                        const destino = "Museo%20de%20las%20Aves%20de%20M%C3%A9xico%2C%20Saltillo%2C%20Coahuila";
                        const nuevaURL = `https://www.google.com/maps/embed/v1/directions?key=AIzaSyAjwIYlkQQCbqguGflc3tQifzE2onneqco&origin=${miLat},${miLng}&destination=${destino}&mode=driving`;
                        document.querySelector('iframe').src = nuevaURL;
                    },
                    function(error) {
                        // Si no puede detectar tu ubicación, muestra un mensaje
                        console.log("No se pudo obtener tu ubicación: " + error.message);
                        // La ruta seguirá usando el centro de Saltillo como origen
                    }
                );
            } else {
                alert("Tu navegador no soporta geolocalización - se usará el centro de Saltillo como origen");
            }
        }
    </script>
</body>
</html>
