/* Spinner que reemplaza al icono */
.spinner-icono {
    position: absolute; /* Para que se ponga encima */
    top: 20%; /* Lo bajamos a la mitad del botón */
    left: 40%; /* Lo movemos a la mitad del botón */
    transform: translate(-50%, -50%); /* ¡El truco para centrar perfecto! */
    width: 16px; /* Tamaño del spinner */
    height: 16px;
    border: 2px solid #ccc;
    border-top: 4px solid #ff0000;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    background: transparent; /* Fondo transparente */
    margin: 0; /* Quitamos cualquier margen que lo empuje */
    padding: 0; /* Quitamos cualquier padding extra */
}

/* Asegúrate de que el botón tenga posición relativa y overflow hidden */

    <script>
	let rutaCompleta = []; // Aquí se guarda la ruta completa
	let indicePuntoActual = 0; // Aquí se guarda por dónde vas
        let mapa;
        let marcadores = [];
        let infowindowActual;
        let directionsRenderer;
        let resultadoDatos;
        let marcadorSeleccionado = null; // Para guardar el marcador que se abrió en el infowindow
        let watchId = null; // Para controlar el seguimiento GPS
        let marcadorMiUbicacion = null; // Para el marcador de mi ubicación
        let indiceSiguientePunto = 0; // Para controlar el siguiente punto de la ruta
        const URL_APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbx_aBWgPzdKEWqiEFSuzyYZ95Lvc23ijU8dNqy8eckShQfL1oryFGKx1fIOThhFlXEs/exec";
        // Mensaje predeterminado base (luego se personaliza con los datos de cada cliente)
        const MENSAJE_WHATSAPP = "{RECIBE} Su Compra Que Realizo Con {ENVIA} De {CONTENIDO} Por La Cantidad De $ {ACOBRAR}.00 Esta Por llegar a su domicilio en unos cuantos minutos para que este el pendiente de nuestra llegada";

// **************************** SEGUNDA PARTE *******************************
// Inicializar mapa
function initMap() {
    // Coordenadas por defecto (Saltillo, Coahuila)
    const saltillo = { lat: 25.4383, lng: -100.9764 };
    
    mapa = new google.maps.Map(document.getElementById("mapa"), {
        zoom: 12,
        center: saltillo,
        mapTypeControl: false,
        streetViewControl: true, // Activado el muñequito de Street View
        fullscreenControl: false
    });

    // Inicializar renderizador de direcciones UNA SOLA VEZ
    directionsRenderer = new google.maps.DirectionsRenderer({
        map: mapa,
        draggable: false,
        suppressMarkers: true,
        suppressInfoWindows: true
    });

    // Cargar rutas en el selector
    cargarRutas();
//  ******************************************************************************************************
    // Agregar evento al selector para cargar direcciones automáticamente al cambiar la ruta
    document.getElementById("selectorRuta").addEventListener("change", function() {
        const rutaSeleccionada = this.value;
        if (rutaSeleccionada) {
            generarCoordenadasRuta();	
            cargarDireccionesPorRuta(rutaSeleccionada);
        } else {
            // Si no hay ruta seleccionada, limpiar la lista y los marcadores
            document.getElementById('listaDirecciones').innerHTML = '';
            marcadores.forEach(m => m.setMap(null));
            marcadores = [];
            if (directionsRenderer) directionsRenderer.setMap(null);
            resultadoDatos = null;
        }
    });

//   ****************************************************************************************************
    // Agregar botones de control al mapa
    google.maps.event.addListenerOnce(mapa, 'idle', function() {
        agregarBotonesControl();
    });
}

// Cargar rutas desde el backend
async function cargarRutas() {
    try {
        const respuesta = await fetch(URL_APPS_SCRIPT + "?action=obtenerDirecciones");
        const resultado = await respuesta.json();

        if (resultado.success) {
            const selector = document.getElementById("selectorRuta");
            // Mantener la opción por defecto y agregar las rutas del backend
            selector.innerHTML = '<option value="">Selecciona una ruta</option><option value="1">Ruta 1 (Por defecto)</option>';
            
            resultado.rutas.forEach(ruta => {
                const option = document.createElement("option");
                option.value = ruta.id;
                option.textContent = `Ruta ${ruta.id}`;
                selector.appendChild(option);
            });

            // --- CORRECCIÓN: Seleccionar Ruta 1 por defecto y cargarla ---
            selector.value = "1";
            generarCoordenadasRuta();
            cargarDireccionesPorRuta("1");

        } else {
            // Si hay error al cargar rutas, seleccionar Ruta 1 manualmente
            const selector = document.getElementById("selectorRuta");
            selector.value = "1";
            generarCoordenadasRuta();
            cargarDireccionesPorRuta("1");
        }
    } catch (error) {
        console.error("Error:", error);
        alert("No se pudo conectar con la base de datos. Se mostrará la ruta por defecto.");
        // --- CORRECCIÓN: Incluso si hay error, intentar cargar Ruta 1 ---
        const selector = document.getElementById("selectorRuta");
        selector.value = "1";
        generarCoordenadasRuta();
        cargarDireccionesPorRuta("1");
    }
}

// Agregar botones de control al mapa
function agregarBotonesControl() {
    // Botón para centrar en mi ubicación
    const botonCentrar = document.createElement("button");
    botonCentrar.className = "boton-mapa";
    // Usamos rotateX en lugar de scaleX para el volteo
    botonCentrar.innerHTML = '<span style="display: inline-block; transform: rotateX(180deg); font-size: 24px; filter: hue-rotate(240deg) saturate(150%) brightness(60%);">🩸</span>';
    botonCentrar.style.bottom = "95px";
    botonCentrar.style.left = "15px";
    botonCentrar.title = "Centrar en mi ubicación";
    botonCentrar.addEventListener("click", centrarYSeguirUbicacion);
    mapa.getDiv().appendChild(botonCentrar);

    // Botón para ruta al siguiente punto (con icono de flecha azul)
    const botonRutaSiguiente = document.createElement("button");
    botonRutaSiguiente.className = "boton-mapa";
    botonRutaSiguiente.innerHTML = '<i class="fas fa-location-arrow" style="color: #007bff; font-size: 24px;"></i>';
    botonRutaSiguiente.style.bottom = "155px";
    botonRutaSiguiente.style.left= "15px";
    botonRutaSiguiente.title = "Ruta al punto seleccionado";
    botonRutaSiguiente.id = "btnRutaSiguiente";
    mapa.getDiv().appendChild(botonRutaSiguiente);

    // 👇 AQUÍ AGREGAMOS EL EVENTO DIRECTAMENTE AL BOTÓN
    botonRutaSiguiente.addEventListener("click", () => {
    if (!marcadorSeleccionado) {
        alert("Primero abre un marcador (globo) de una dirección para saber a dónde ir.");
        return;
    }

    const envio = resultadoDatos.datos.find(d => String(d.nguia).trim() === String(marcadorSeleccionado.nguia).trim());

    if (!envio || !envio.ruta1 || !envio.ruta1.includes(',')) {
        alert("El marcador seleccionado no tiene coordenadas válidas.");
        return;
    }

    const [latDestino, lngDestino] = envio.ruta1.split(',').map(coord => parseFloat(coord.trim()));
    const destino = new google.maps.LatLng(latDestino, lngDestino);

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (posicion) => {
                const miUbicacion = new google.maps.LatLng(posicion.coords.latitude, posicion.coords.longitude);

                const directionsService = new google.maps.DirectionsService();
                
                // 👇 CAMBIAMOS EL COLOR DE LA RUTA AQUÍ
                directionsRenderer.setOptions({
                    polylineOptions: {
                        strokeColor: "#228b22", // Azul Bootstrap (puedes poner el código de color que quieras)
                        strokeWeight: 6, // Un poco más gruesa para que se note
                        strokeOpacity: 0.9 // Casi opaca
                    }
                });
                directionsRenderer.setMap(mapa);

                const request = {
                    origin: miUbicacion,
                    destination: destino,
                    travelMode: google.maps.TravelMode.DRIVING
                };

                directionsService.route(request, (result, status) => {
                    if (status === google.maps.DirectionsStatus.OK) {
                        directionsRenderer.setDirections(result);
                    } else {
                        alert("Error al calcular la ruta: " + status);
                    }
                });
            },
            (error) => {
                alert("No se pudo obtener tu ubicación: " + error.message);
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    } else {
        alert("Tu navegador no soporta geolocalización.");
    }
});
}

// Función para convertir un emoji a una imagen (usando canvas)
function emojiToImage(emoji, size = 32) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = size;
    canvas.height = size;
    
    ctx.font = `${size}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    ctx.fillText(emoji, size / 2, size / 2);
    
    return canvas.toDataURL();
}

function centrarYSeguirUbicacion() {
    if (navigator.geolocation) {
        if (watchId) {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
        }

        navigator.geolocation.getCurrentPosition(
            (posicion) => {
                const miUbicacion = {
                    lat: posicion.coords.latitude,
                    lng: posicion.coords.longitude
                };

                mapa.setCenter(miUbicacion);
                mapa.setZoom(15);

                // Actualizamos o creamos el marcador con emoji
                if (marcadorMiUbicacion) {
                    marcadorMiUbicacion.setPosition(miUbicacion);
                } else {
                    marcadorMiUbicacion = new google.maps.Marker({
                        position: miUbicacion,
                        map: mapa,
                        title: "Mi ubicación",
                        icon: {
                            url: emojiToImage("🏍️", 24), // Cambia el emoji aquí si quieres otro
                            scaledSize: new google.maps.Size(24, 24) // Tamaño del icono
                        }
                    });
                }

                // Iniciamos el seguimiento
                watchId = navigator.geolocation.watchPosition(
                    (posicionSeguimiento) => {
                        const ubicacionActual = {
                            lat: posicionSeguimiento.coords.latitude,
                            lng: posicionSeguimiento.coords.longitude
                        };

                        if (marcadorMiUbicacion) {
                            marcadorMiUbicacion.setPosition(ubicacionActual);
                        }
                    },
                    (error) => {
                        console.error("Error en el seguimiento:", error);
                        let mensaje = "Error en el seguimiento de ubicación: ";
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                mensaje += "Debes dar permiso de ubicación en tu navegador.";
                                break;
                            case error.POSITION_UNAVAILABLE:
                                mensaje += "La ubicación no está disponible.";
                                break;
                            case error.TIMEOUT:
                                mensaje += "Se agotó el tiempo de espera.";
                                break;
                        }
                        alert(mensaje);
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            },
            (error) => {
                let mensaje = "No se pudo obtener tu ubicación. ";
                switch(error.code) {
                    case error.PERMISSION_DENIED:
                        mensaje += "Debes dar permiso de ubicación en tu navegador.";
                        break;
                    case error.POSITION_UNAVAILABLE:
                        mensaje += "La ubicación no está disponible.";
                        break;
                    case error.TIMEOUT:
                        mensaje += "Se agotó el tiempo de espera.";
                        break;
                }
                alert(mensaje);
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
    } else {
        alert("Tu navegador no soporta geolocalización.");
    }
}

        // Obtener ubicación actual del usuario para usar como origen
        function obtenerUbicacionYCalcularRuta(puntosRuta, tipo) {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const miUbicacion = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };

                    // Agregar marcador de mi ubicación
                    new google.maps.Marker({
                        position: miUbicacion,
                        map: mapa,
                        title: "Mi ubicación",
                        icon: {
                            path: google.maps.SymbolPath.CIRCLE,
                            fillColor: "blue",
                            fillOpacity: 1,
                            strokeWeight: 0,
                            scale: 8
                        }
                    });

                    // Configurar origen, destino y waypoints según el tipo de ruta
                    let origen, destino, waypoints;

                    if (puntosRuta.length === 1) {
                        // Si solo hay un punto, ir desde mi ubicación hasta ese punto
                        origen = miUbicacion;
                        destino = new google.maps.LatLng(puntosRuta[0].lat, puntosRuta[0].lng);
                        waypoints = [];
                    } else {
                        origen = miUbicacion;
                        destino = new google.maps.LatLng(
                            puntosRuta[puntosRuta.length - 1].lat,
                            puntosRuta[puntosRuta.length - 1].lng
                        );
                        waypoints = puntosRuta.slice(0, -1).map(punto => ({
                            location: new google.maps.LatLng(punto.lat, punto.lng),
                            stopover: true
                        }));
                    }

                    // Configurar petición según tipo de ruta
                    const request = {
                        origin: new google.maps.LatLng(origen.lat, origen.lng),
                        destination: destino,
                        waypoints: waypoints,
                        travelMode: google.maps.TravelMode.DRIVING,
                        optimizeWaypoints: tipo === "automatica"
                    };

                    // Calcular ruta
                    const directionsService = new google.maps.DirectionsService();
                    directionsService.route(request, function(result, status) {
                        if (status === google.maps.DirectionsStatus.OK) {
                            directionsRenderer.setDirections(result);
                        } else {
                            alert("No se pudo calcular la ruta: " + status);
                        }
                    });

                }, function(error) {
                    // Si no se puede obtener la ubicación, usar el primer punto como origen
                    alert("No se pudo obtener tu ubicación. Se usará el primer punto de la ruta como origen.");
                    usarPrimerPuntoComoOrigen(puntosRuta, tipo);
                });
            } else {
                // Si el navegador no soporta geolocalización
                alert("Tu navegador no soporta geolocalización. Se usará el primer punto de la ruta como origen.");
                usarPrimerPuntoComoOrigen(puntosRuta, tipo);
            }
        }

        // Función auxiliar: usar primer punto como origen si no hay ubicación del usuario
        function usarPrimerPuntoComoOrigen(puntosRuta, tipo) {
            let origen, destino, waypoints;

            if (puntosRuta.length === 1) {
                origen = new google.maps.LatLng(puntosRuta[0].lat, puntosRuta[0].lng);
                destino = origen;
                waypoints = [];
            } else {
                origen = new google.maps.LatLng(puntosRuta[0].lat, puntosRuta[0].lng);
                destino = new google.maps.LatLng(puntosRuta[puntosRuta.length - 1].lat, puntosRuta[puntosRuta.length - 1].lng);
                waypoints = puntosRuta.slice(1, -1).map(punto => ({
                    location: new google.maps.LatLng(punto.lat, punto.lng),
                    stopover: true
                }));
            }

            const request = {
                origin: origen,
                destination: destino,
                waypoints: waypoints,
                travelMode: google.maps.TravelMode.DRIVING,
                optimizeWaypoints: tipo === "automatica"
            };

            const directionsService = new google.maps.DirectionsService();
            directionsService.route(request, function(result, status) {
                if (status === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(result);
                } else {
                    alert("No se pudo calcular la ruta: " + status);
                }
            });
        }

        resultadoDatos = null;

    }

    try {
        const respuesta = await fetch(URL_APPS_SCRIPT, {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: `action=obtenerDirecciones&ruta=${encodeURIComponent(numeroRuta)}`
        });

// Nueva función para poner ACOBRAR en cero y marcar como entregado (llamando a acción específica del backend)
async function actualizarEstadoConCero(nguia) {
    // Referencias al modal de confirmación de pago
    const modal = document.getElementById('ventanaConfirmacionPago');
    const btnAceptar = document.getElementById('btnAceptarConfirmacion');
    const btnCancelar = document.getElementById('btnCancelarConfirmacion');

    // Mostrar el modal
    modal.style.display = 'flex';

    // Función que ejecuta el proceso cuando el usuario confirma
    async function ejecutarProceso() {
        // Ocultar el modal
        modal.style.display = 'none';

        // Buscar el botón, spinner e icono específicos para esta guía
        const btnTarjeta = document.getElementById(`btnTarjeta_${nguia}`);
        const spinnerTarjeta = document.getElementById(`spinnerTarjeta_${nguia}`);
        const iconoTarjeta = document.getElementById(`iconoTarjeta_${nguia}`);

        // Si ya está cargando, no hacemos nada
        if (btnTarjeta.dataset.cargando === "true") {
            return;
        }

        // Marcar como cargando
        btnTarjeta.dataset.cargando = "true";
        iconoTarjeta.style.display = 'none';
        spinnerTarjeta.style.display = 'inline-block';
        btnTarjeta.disabled = true;

        try {
            // Buscar el envío correspondiente a la guía
            const envio = resultadoDatos.datos.find(d => String(d.nguia).trim() === String(nguia).trim());

            if (!envio) {
                alert("No se encontró el envío con NGUIA: " + nguia);
                return;
            }

            // Variables para fecha, hora y ubicación
            let fechaFormato = "";
            let horaFormato = "";
            let localizacionEnt = "";

            // Obtener fecha y hora actual en formato local
            const fechaActual = new Date();
            fechaFormato = fechaActual.toLocaleDateString('es-ES');
            horaFormato = fechaActual.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

            // Función para obtener la ubicación del dispositivo
            function obtenerUbicacion() {
                return new Promise((resolve, reject) => {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(
                            (position) => {
                                resolve(`${position.coords.latitude}, ${position.coords.longitude}`);
                            },
                            (error) => {
                                reject(error);
                            },
                            { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
                        );
                    } else {
                        reject(new Error("Tu navegador no soporta geolocalización"));
                    }
                });
            }

            // Intentar obtener la ubicación
            try {
                localizacionEnt = await obtenerUbicacion();
            } catch (error) {
                alert("No se pudo obtener tu ubicación: " + error.message);
            }

            // Parámetros a enviar al backend
            const bodyParams = `action=actualizarEstadoPagoVendedor&nguia=${encodeURIComponent(nguia)}&estado=${encodeURIComponent('ENTREGADO')}&fecha_ent=${encodeURIComponent(fechaFormato)}&hora_ent=${encodeURIComponent(horaFormato)}&localizacion_ent=${encodeURIComponent(localizacionEnt)}`;

            // Petición al backend
            const respuesta = await fetch(URL_APPS_SCRIPT, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: bodyParams
            });
            const resultado = await respuesta.json();

            // Procesar respuesta del backend
            if (resultado.success) {
                // Buscar el marcador correspondiente en el mapa
                const marcador = marcadores.find(m => m.nguia?.toString().trim() === nguia.toString().trim());
                if (marcador) {
                    // Cambiar color del marcador a verde
                    marcador.setIcon({
                        path: google.maps.SymbolPath.CIRCLE,
                        fillColor: "green",
                        fillOpacity: 1,
                        strokeWeight: 0,
                        scale: 6
                    });

                    // Cerrar el infowindow si está abierto
                    if (infowindowActual) {
                        infowindowActual.close();
                        infowindowActual = null;
                    }

                    // Eliminar el marcador y el elemento de la lista después de un breve retraso
                    setTimeout(() => {
                        marcador.setMap(null);
                        marcadores.splice(marcadores.indexOf(marcador), 1);
                        const lista = document.getElementById('listaDirecciones');
                        const items = lista.getElementsByClassName('direccion-item');
                        for (let i = 0; i < items.length; i++) {
                            if (items[i].textContent.includes(`Guía ${nguia}`)) {
                                lista.removeChild(items[i]);
                                break;
                            }
                        }
                    }, 800);
                }
            } else {
                alert("Error al actualizar: " + resultado.message);
            }

        } catch (error) {
            console.error("Error en envío de datos:", error);
            alert("No se pudo actualizar el estado. Error: " + error.message);
        } finally {
            // Restaurar el estado original del botón
            btnTarjeta.dataset.cargando = "false";
            spinnerTarjeta.style.display = 'none';
            iconoTarjeta.style.display = 'inline-block';
            btnTarjeta.disabled = false;
        }
    }

    // Eventos para los botones del modal
    btnAceptar.onclick = ejecutarProceso;
    btnCancelar.onclick = () => {
        modal.style.display = 'none';
    };

    // Cerrar modal al hacer clic fuera del contenido
    modal.onclick = (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    };
}

    // --------------------------
    // AGREGADO: MANEJO DE SPINNER SOLO PARA ENTREGADO

    let btn, spinner, icono;
    if (nuevoEstado === 'ENTREGADO') {
        btn = document.getElementById(`btnEntregado_${nguia}`);
        spinner = document.getElementById(`spinnerEntregado_${nguia}`);
        icono = document.getElementById(`iconoEntregado_${nguia}`);
    }

    // Evitar clics múltiples en ENTREGADO
    if (nuevoEstado === 'ENTREGADO' && btn?.dataset.cargando === "true") {
        return;
    }

    // Bloquear botón ENTREGADO mientras procesa
    if (nuevoEstado === 'ENTREGADO' && btn) {
        btn.dataset.cargando = "true";
        icono.style.display = 'none';
        spinner.style.display = 'inline-block';
        btn.disabled = true;
    }


    // --------------------------
    // LÓGICA ORIGINAL COMPLETA (SIN MODIFICACIONES)
    // --------------------------
    try {
        const envio = resultadoDatos.datos.find(d => String(d.nguia).trim() === String(nguia).trim());

        if (!envio) {
            alert("No se encontró el envío con NGUIA: " + nguia);
            // AGREGADO: Restaurar botón si hay error
            if (nuevoEstado === 'ENTREGADO' && btn) {
                btn.dataset.cargando = "false";
                spinner.style.display = 'none';
                icono.style.display = 'inline-block';
                btn.disabled = false;
            }
            return;
        }

        // Variables para enviar (se declaran aquí para que estén disponibles en todo el ámbito)
        let total = 0;
        const tipoPago = "EFECTIVO"; // Default, si corresponde
        let fechaFormato = "";
        let horaFormato = "";
        let localizacionEnt = "";

        const fechaActual = new Date();
        fechaFormato = fechaActual.toLocaleDateString('es-ES');
        horaFormato = fechaActual.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });

        // Función para obtener ubicación (devuelve una promesa)
        function obtenerUbicacion() {
            return new Promise((resolve, reject) => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            resolve(`${position.coords.latitude}, ${position.coords.longitude}`);
                        },
                        (error) => {
                            reject(error);
                        },
                        { enableHighAccuracy: true, timeout: 30000, maximumAge: 0 }
                    );
                } else {
                    reject(new Error("Tu navegador no soporta geolocalización"));
                }
            });
        }

        // Si el estado es VISITADO, primero mostramos la ventana de razón y luego obtenemos ubicación
        if (nuevoEstado === "VISITADO") {
            // Mostrar ventana emergente
            const ventana = document.getElementById('ventanaRazonEntrega');
            const campoRazon = document.getElementById('campoRazon');
            const mensajeError = document.getElementById('mensajeError');
            const btnEnviar = document.getElementById('btnEnviarRazon');
            const btnCancelar = document.getElementById('btnCancelarRazon');

            // Limpiar campos y errores anteriores
            campoRazon.value = '';
            mensajeError.textContent = '';
            ventana.style.display = 'flex';

            // Función para manejar el envío de la razón
            const manejarEnvio = async () => {
                const razon = campoRazon.value.trim();

                // Validaciones
                if (!razon) {
                    mensajeError.textContent = "Por favor, escribe una razón.";
                    return;
                }

                if (razon.length < 8) {
                    mensajeError.textContent = "La razón debe tener al menos 8 caracteres.";
                    return;
                }

                const todosIguales = razon.split('').every(c => c === razon[0]);
                const tieneLetras = /[a-zA-ZáéíóúÁÉÍÓÚñÑ]/.test(razon);

                if (todosIguales || !tieneLetras) {
                    mensajeError.textContent = "Por favor, escribe una razón válida (no solo caracteres repetidos o símbolos).";
                    return;
                }

                // Si pasa las validaciones, ocultar ventana y obtener ubicación
                ventana.style.display = 'none';
                btnEnviar.removeEventListener('click', manejarEnvio);
                btnCancelar.removeEventListener('click', manejarCancelacion);

                try {
                    // Obtener ubicación antes de procesar actualización
                    localizacionEnt = await obtenerUbicacion();
                } catch (error) {
                    alert("No se pudo obtener tu ubicación: " + error.message);
                    // Si no se obtiene ubicación, se deja vacía
                }

                // Continuar con la actualización pasando la razón
                await procesarActualizacion(razon);
            };

            // Función para manejar la cancelación
            const manejarCancelacion = () => {
                ventana.style.display = 'none';
                btnEnviar.removeEventListener('click', manejarEnvio);
                btnCancelar.removeEventListener('click', manejarCancelacion);
            };

            // Agregar event listeners
            btnEnviar.addEventListener('click', manejarEnvio);
            btnCancelar.addEventListener('click', manejarCancelacion);

            // No continuar con el resto de la función hasta que se envíe o cancele
            return;
        }

        // Si no es VISITADO, obtener ubicación y continuar
        try {
            localizacionEnt = await obtenerUbicacion();
        } catch (error) {
            alert("No se pudo obtener tu ubicación: " + error.message);
            // AGREGADO: Restaurar botón si hay error
            if (nuevoEstado === 'ENTREGADO' && btn) {
                btn.dataset.cargando = "false";
                spinner.style.display = 'none';
                icono.style.display = 'inline-block';
                btn.disabled = false;
            }
            // Si no se obtiene ubicación, se deja vacía
        }

        await procesarActualizacion();

        async function procesarActualizacion(razonEntrega = null) {
            try {
                let bodyParams = "";

                if (nuevoEstado === "VISITADO") {
                    // Usar la razón ingresada por el usuario
                    const notaFinal = razonEntrega || "¿Por qué no se realizó la entrega?";
                    
                    // Solo actualizamos columnas específicas para "VISITADO"
                    bodyParams = `action=actualizarEstado&nguia=${encodeURIComponent(nguia)}&estado=${encodeURIComponent(nuevoEstado)}&nota_1=${encodeURIComponent(notaFinal)}&localizacion_1=${encodeURIComponent(localizacionEnt)}&fecha_hora_1=${encodeURIComponent(horaFormato + ', ' + fechaFormato)}`;
                } else if (nuevoEstado === "ENTREGADO") {
                    // Calculamos total y enviamos todo
                    const acobrar = parseFloat(envio.acobrar) || 0;
                    const extra = parseFloat(envio.extra) || 0;
                    total = acobrar - extra;

                    bodyParams = `action=actualizarEstado&nguia=${encodeURIComponent(nguia)}&estado=${encodeURIComponent(nuevoEstado)}&total=${encodeURIComponent(total)}&tipo_pago=${encodeURIComponent(tipoPago)}&fecha_ent=${encodeURIComponent(fechaFormato)}&hora_ent=${encodeURIComponent(horaFormato)}&localizacion_ent=${encodeURIComponent(localizacionEnt)}`;
                }

                // Realizar la petición al backend
                const respuesta = await fetch(URL_APPS_SCRIPT, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: bodyParams
                });
                const resultado = await respuesta.json();

                if (resultado.success) {
                 //   alert(resultado.message);

                    const marcador = marcadores.find(m => m.nguia?.toString().trim() === nguia.toString().trim());
                    if (marcador) {
                        // Cambio de color basado en estado
                        if (nuevoEstado === "ENTREGADO") {
                            marcador.setIcon({
                                path: google.maps.SymbolPath.CIRCLE,
                                fillColor: "green",
                                fillOpacity: 1,
                                strokeWeight: 0,
                                scale: 6
                            });
                        } else if (nuevoEstado === "VISITADO") {
                            marcador.setIcon({
                                path: google.maps.SymbolPath.CIRCLE,
                                fillColor: "#ffc107",
                                fillOpacity: 1,
                                strokeWeight: 0,
                                scale: 6
                            });
                        }

                        // Actualizar contenido del infowindow
                        if (infowindowActual) {
                            let contenido = infowindowActual.getContent();

                            if (nuevoEstado === "VISITADO") {
                                // Solo actualizar las columnas específicas
                                contenido = contenido.replace(
                                    /<strong>Estado:<\/strong> <span style="color:.*?">.*?<\/span>/,
                                    `<strong>Estado:</strong> <span style="color: #ffc107;">VISITADO</span>`
                                );
                                // Nota 1
                                const notaMostrar = razonEntrega || "¿Por qué no se realizó la entrega?";
                                contenido = contenido.replace(
                                    /(<div[^>]*>.*?<strong>Nota 1:<\/strong>.*?<\/div>)/,
                                    `<div><strong>Nota 1:</strong> ${notaMostrar}</div>`
                                );
                                // Localización 1
                                contenido = contenido.replace(
                                    /(<div[^>]*>.*?<strong>Localización 1:<\/strong>.*?<\/div>)/,
                                    `<div><strong>Localización 1:</strong> ${localizacionEnt}</div>`
                                );
                                // Fecha y Hora 1
                                contenido = contenido.replace(
                                    /(<div[^>]*>.*?<strong>Fecha y Hora 1:<\/strong>.*?<\/div>)/,
                                    `<div><strong>Fecha y Hora 1:</strong> ${horaFormato}, ${fechaFormato}</div>`
                                );
                                infowindowActual.setContent(contenido);
                            }
                        }

                        // Cerrar infowindow
                        if (infowindowActual) {
                            infowindowActual.close();
                            infowindowActual = null;
                        }

                        // Si es entregado, eliminar marcador
                        if (nuevoEstado === "ENTREGADO") {
                            setTimeout(() => {
                                marcador.setMap(null);
                                marcadores.splice(marcadores.indexOf(marcador), 1);
                                // Quitar fila en lista
                                const lista = document.getElementById('listaDirecciones');
                                const items = lista.getElementsByClassName('direccion-item');
                                for (let i = 0; i < items.length; i++) {
                                    if (items[i].textContent.includes(`Guía ${nguia}`)) {
                                        lista.removeChild(items[i]);
                                        break;
                                    }
                                }
                            }, 800);
                        }
                    }
                } else {
                    alert("Error al actualizar: " + resultado.message);
                }
            } catch (error) {
                console.error("Error en envío de datos:", error);
                alert("No se pudo actualizar el estado. Error: " + error.message);
            } finally {
                // AGREGADO: Restaurar botón ENTREGADO al finalizar procesamiento
                if (nuevoEstado === 'ENTREGADO' && btn) {
                    btn.dataset.cargando = "false";
                    spinner.style.display = 'none';
                    icono.style.display = 'inline-block';
                    btn.disabled = false;
                }
            }
        }
    } catch (error) {
        console.error("Error general:", error);
        alert("Error: " + error.message);
        // AGREGADO: Restaurar botón si hay error general
        if (nuevoEstado === 'ENTREGADO' && btn) {
            btn.dataset.cargando = "false";
            spinner.style.display = 'none';
            icono.style.display = 'inline-block';
            btn.disabled = false;
        }
    }
}

// ************************ FUNCIÓN PARA BORRAR RUTA CONFORME SE AVANZA ************************
function actualizarRutaRecorrida(ubicacionActual) {
    if (!rutaCompleta || rutaCompleta.length === 0) return;

    // Encontrar el punto más cercano a la ubicación actual
    let indiceMasCercano = -1;
    let distanciaMinima = Infinity;

    rutaCompleta.forEach((punto, indice) => {
        const distancia = google.maps.geometry.spherical.computeDistanceBetween(
            new google.maps.LatLng(ubicacionActual.lat, ubicacionActual.lng),
            new google.maps.LatLng(punto.lat, punto.lng)
        );

        if (distancia < distanciaMinima) {
            distanciaMinima = distancia;
            indiceMasCercano = indice;
        }
    });

    // Si encontramos un punto más cercano y es posterior al que ya tenemos, actualizamos
    if (indiceMasCercano !== -1 && indiceMasCercano > indicePuntoActual) {
        indicePuntoActual = indiceMasCercano;

        // Tomar solo los puntos que faltan por recorrer
        const puntosRestantes = rutaCompleta.slice(indicePuntoActual);

        if (puntosRestantes.length > 0) {
            const directionsService = new google.maps.DirectionsService();
            let origen, destino, waypoints;

            if (puntosRestantes.length === 1) {
                origen = new google.maps.LatLng(ubicacionActual.lat, ubicacionActual.lng);
                destino = new google.maps.LatLng(puntosRestantes[0].lat, puntosRestantes[0].lng);
                waypoints = [];
            } else {
                origen = new google.maps.LatLng(ubicacionActual.lat, ubicacionActual.lng);
                destino = new google.maps.LatLng(puntosRestantes[puntosRestantes.length - 1].lat, puntosRestantes[puntosRestantes.length - 1].lng);
                waypoints = puntosRestantes.slice(1, -1).map(punto => ({
                    location: new google.maps.LatLng(punto.lat, punto.lng),
                    stopover: true
                }));
            }

            directionsService.route({
                origin: origen,
                destination: destino,
                waypoints: waypoints,
                travelMode: google.maps.TravelMode.DRIVING
            }, function(resultado, status) {
                if (status === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(resultado);
                    // Actualizar la ruta completa con la nueva ruta calculada
                    rutaCompleta = resultado.routes[0].overview_path.map(punto => ({
                        lat: punto.lat(),
                        lng: punto.lng()
                    }));
                    // Reiniciar el índice desde el inicio de la nueva ruta
                    indicePuntoActual = 0;
                }
            });
        } else {
            // Si ya no hay puntos restantes, ocultar la ruta
            directionsRenderer.setMap(null);
        }
    }
}

// Función principal para calcular rutas
function calcularRuta(tipo) {
// Limpiar ruta anterior si existe
if (directionsRenderer) {
    directionsRenderer.setMap(null);
}

const rutaActual = document.getElementById('selectorRuta').value;
if (!rutaActual) {
    alert("Por favor, selecciona una ruta primero.");
    return;
}

if (!resultadoDatos || !resultadoDatos.datos) {
    alert("Primero carga las direcciones de la ruta.");
    return;
}

// Obtener puntos válidos de la lista actual
const puntosRuta = resultadoDatos.datos.map(dato => {
    if (dato.ruta1 && dato.ruta1.includes(',')) {
        const [lat, lng] = dato.ruta1.split(',').map(coord => parseFloat(coord.trim()));
        return { lat, lng, estado: dato.estado };
    }
}).filter(punto => punto); // Filtrar puntos válidos

if (puntosRuta.length < 1) {
    alert("No hay puntos válidos para calcular la ruta.");
    return;
}

// Inicializar Directions Service (solo una vez aquí)
const directionsService = new google.maps.DirectionsService();
// Usar la instancia global de directionsRenderer ya creada en initMap()
directionsRenderer.setMap(mapa); // Volver a asignar el mapa si se había quitado

// Configurar origen, destino y waypoints UNA SOLA VEZ (fuera del watchPosition)
let origen, destino, waypoints;
if (puntosRuta.length === 1) {
    origen = null; // Se actualizará con la ubicación real
    destino = new google.maps.LatLng(puntosRuta[0].lat, puntosRuta[0].lng);
    waypoints = [];
} else {
    origen = null;
    destino = new google.maps.LatLng(
        puntosRuta[puntosRuta.length - 1].lat,
        puntosRuta[puntosRuta.length - 1].lng
    );
    waypoints = puntosRuta.slice(0, -1).map(punto => ({
        location: new google.maps.LatLng(punto.lat, punto.lng),
        stopover: true
    }));
}

// Función para calcular la ruta (se llama una vez o cuando cambie la ubicación inicial)
function calcularRutaConOrigen(origenReal) {
    const request = {
        origin: new google.maps.LatLng(origenReal.lat, origenReal.lng),
        destination: destino,
        waypoints: waypoints,
        travelMode: google.maps.TravelMode.DRIVING,
        optimizeWaypoints: tipo === "automatica"
    };

    directionsService.route(request, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK) {
            directionsRenderer.setDirections(result);
        } else {
            alert("No se pudo calcular la ruta: " + status);
        }
    });
}

// Obtener ubicación actual del usuario y hacer seguimiento en tiempo real
if (navigator.geolocation) {
    // Detener cualquier seguimiento anterior
    if (watchId) {
        navigator.geolocation.clearWatch(watchId);
    }

    // Variable para saber si ya se calculó la ruta la primera vez
    let rutaCalculada = false;

    // Iniciar seguimiento en tiempo real
    watchId = navigator.geolocation.watchPosition(
        function(position) {
            const miUbicacion = {
                lat: position.coords.latitude,
                lng: position.coords.longitude
            };

            // Actualizar o crear el marcador de mi ubicación
            if (marcadorMiUbicacion) {
                marcadorMiUbicacion.setPosition(miUbicacion);
            } else {
                marcadorMiUbicacion = new google.maps.Marker({
                    position: miUbicacion,
                    map: mapa,
                    title: "Mi ubicación",
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        fillColor: "blue",
                        fillOpacity: 1,
                        strokeWeight: 0,
                        scale: 8
                    }
                });
            }

            // Centrar mapa automáticamente en mi ubicación
            mapa.panTo(miUbicacion);

            // Calcular la ruta SOLO LA PRIMERA VEZ que obtenemos la ubicación
            if (!rutaCalculada) {
                calcularRutaConOrigen(miUbicacion);
                rutaCalculada = true;
            }
        },
        function(error) {
            alert("No se pudo obtener tu ubicación en tiempo real. Se usará el primer punto de la ruta como origen.");
            usarPrimerPuntoComoOrigen(puntosRuta, tipo, directionsService, directionsRenderer);
        },
        {
            enableHighAccuracy: true,
            maximumAge: 1000,
            timeout: 5000
        }
    );
} else {
    alert("Tu navegador no soporta geolocalización. Se usará el primer punto de la ruta como origen.");
    usarPrimerPuntoComoOrigen(puntosRuta, tipo, directionsService, directionsRenderer);
}

// Función auxiliar: usar primer punto como origen si no hay ubicación del usuario
function usarPrimerPuntoComoOrigen(puntosRuta, tipo, directionsService, directionsRenderer) {
    let origen, destino, waypoints;

    if (puntosRuta.length === 1) {
        origen = new google.maps.LatLng(puntosRuta[0].lat, puntosRuta[0].lng);
        destino = origen;
        waypoints = [];
    } else {
        origen = new google.maps.LatLng(puntosRuta[0].lat, puntosRuta[0].lng);
        destino = new google.maps.LatLng(puntosRuta[puntosRuta.length - 1].lat, puntosRuta[puntosRuta.length - 1].lng);
        waypoints = puntosRuta.slice(1, -1).map(punto => ({
            location: new google.maps.LatLng(punto.lat, punto.lng),
            stopover: true
        }));
    }

    const request = {
        origin: origen,
        destination: destino,
        waypoints: waypoints,
        travelMode: google.maps.TravelMode.DRIVING,
        optimizeWaypoints: tipo === "automatica"
    };

    directionsService.route(request, function(result, status) {
        if (status === google.maps.DirectionsStatus.OK) {
            directionsRenderer.setDirections(result);
        } else {
            alert("No se pudo calcular la ruta: " + status);
        }
    });
}
}

                    });

                    contenidoHTML += `
                        <div style="margin-top: 15px; padding: 10px; font-weight: bold; font-size: 1.1em; text-align: right; border-top: 2px solid #ccc; background: white; border-radius: 4px;">
                            Total Cobrado: $${totalCobrado.toFixed(2)}
                        </div>
                    `;
                }

                contenidoEntregados.innerHTML = contenidoHTML;
            }
        } catch (error) {
            contenidoEntregados.innerHTML = `<p>Error al conectar: ${error.message}</p>`;
        }

    } else {
        panelEntregados.style.display = 'none';
    }
}

// Función para cerrar SOLO el panel de Direcciones de la Ruta
function cerrarPanelDirecciones() {
    const panel = document.querySelector('.contenedor-lista'); // El primero, o ponle un ID
    cerrarVentana(panel); // Usamos la función que ya tienes
}

// Función para cerrar SOLO el panel de Entregados del Día
function cerrarPanelEntregados() {
    const panel = document.getElementById('panelEntregados'); // Usamos su ID
    cerrarVentana(panel); // Usamos la función que ya tienes
}

// Función para cerrar la ventana (panel)
function cerrarVentana(ventana) {
    ventana.style.display = 'none';
}


// *******************************************************************************

// Función para mostrar u ocultar el menú hamburguesa
function toggleMenu() {
ocultarContenedorInfoFijo(); 
const menu = document.getElementById('menuHamburguesa');
if (menu.style.display === 'none' || menu.style.display === '') {
    menu.style.display = 'block';
} else {
    menu.style.display = 'none';
}
}

function ocultarContenedorInfoFijo() {
    const contenedor = document.getElementById('contenedorInfoFijo');
    contenedor.style.display = 'none';
    document.body.classList.remove('contenedor-info-visible'); // IMPORTANTE: Quita la clase para que el mapa vuelva a su lugar
}

// Cargar mapa cuando se cargue la página
window.onload = initMap;

// Cerrar el menú hamburguesa al hacer clic fuera de él
document.addEventListener('click', function(event) {
    const menu = document.getElementById('menuHamburguesa');
    const botonMenu = document.querySelector('.btn-hamburguesa');
    
    // Verificar si el clic no fue ni en el menú ni en el botón de abrirlo
    if (!menu.contains(event.target) && !botonMenu.contains(event.target)) {
        // Si el menú está abierto, cerrarlo
        if (menu.style.display === 'block') {
            menu.style.display = 'none';
        }
    }
});

</script>
