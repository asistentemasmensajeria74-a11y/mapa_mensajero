    if (navigator.geolocation) {
      botonRutaSiguiente.innerHTML = '<div class="spinner-icono"></div>'; // Mostrar spinner
      navigator.geolocation.getCurrentPosition(
        (posicion) => {
          const miUbicacion = `${posicion.coords.latitude},${posicion.coords.longitude}`;
          const destino = `${envio.direccion}, Saltillo, Coahuila, Mexico`.replace(/\s/g, '+');
          const urlRuta = `https://www.google.com/maps/embed/v1/directions?key=AIzaSyAjwIYlkQQCbqguGflc3tQifzE2onneqco&origin=${miUbicacion}&destination=${destino}&mode=driving`;
          document.getElementById('mapa').src = urlRuta;
          botonRutaSiguiente.innerHTML = '<i class="fas fa-directions"></i>'; // Ocultar spinner
        },
        (error) => {
          const origen = "Saltillo,Coahuila,Mexico".replace(/\s/g, '+');
          const destino = `${envio.direccion}, Saltillo, Coahuila, Mexico`.replace(/\s/g, '+');
          const urlRuta = `https://www.google.com/maps/embed/v1/directions?key=AIzaSyAjwIYlkQQCbqguGflc3tQifzE2onneqco&origin=${origen}&destination=${destino}&mode=driving`;
          document.getElementById('mapa').src = urlRuta;
          botonRutaSiguiente.innerHTML = '<i class="fas fa-directions"></i>'; // Ocultar spinner
          alert("No se pudo obtener tu ubicación. Se usará Saltillo como origen.");
        }
      );
    } else {
      alert("Tu navegador no soporta geolocalización.");
    }
  });
}

// --- NUEVA FUNCIÓN PARA GENERAR RUTA COMPLETA EN EL IFRAME ---
function generarRutaCompleta() {
  if (!resultadoDatos || !resultadoDatos.datos || resultadoDatos.datos.length === 0) {
    alert('No hay direcciones para generar la ruta');
    return;
  }

  // Obtener todas las direcciones de la ruta
  const direcciones = resultadoDatos.datos
    .filter(item => String(item.ruta).trim() === String(rutaSeleccionada).trim())
    .map(item => `${item.direccion}, Saltillo, Coahuila, Mexico`.replace(/\s/g, '+'));

  if (direcciones.length < 2) {
    alert('Se necesitan al menos 2 direcciones para generar una ruta completa');
    return;
  }

  // Construir URL de ruta múltiple
  const origen = direcciones[0];
  const destino = direcciones[direcciones.length - 1];
  const waypoints = direcciones.slice(1, -1).map(dir => `via:${dir}`).join('|');
  
  const urlRutaCompleta = `https://www.google.com/maps/embed/v1/directions?key=AIzaSyAjwIYlkQQCbqguGflc3tQifzE2onneqco&origin=${origen}&destination=${destino}&waypoints=${waypoints}&mode=driving`;
  document.getElementById('mapa').src = urlRutaCompleta;
}
